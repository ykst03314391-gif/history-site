<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="房総の戦国のイメージイラスト（海辺の城のシルエット）">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f1ea"/>
      <stop offset="0.5" stop-color="#f0dccb"/>
      <stop offset="1" stop-color="#e6c1a4"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7f9aa4"/>
      <stop offset="1" stop-color="#5b7480"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="800" height="450" fill="url(#sky)"/>

  <!-- sun -->
  <circle cx="602" cy="150" r="66" fill="#c66b5f" opacity="0.85"/>
  <circle cx="602" cy="150" r="66" fill="none" stroke="#9b2d20" stroke-width="2" opacity="0.45"/>

  <!-- distant hills -->
  <path d="M0,318 Q160,268 320,304 T640,296 Q720,290 800,312 L800,360 L0,360 Z" fill="#8a6a5c" opacity="0.30"/>

  <!-- sea -->
  <rect y="360" width="800" height="90" fill="url(#sea)"/>
  <g stroke="#23201c" stroke-width="1.4" opacity="0.22" fill="none">
    <path d="M0,382 q40,-7 80,0 t80,0 t80,0 t80,0 t80,0 t80,0 t80,0 t80,0 t80,0 t80,0"/>
    <path d="M0,406 q40,-7 80,0 t80,0 t80,0 t80,0 t80,0 t80,0 t80,0 t80,0 t80,0 t80,0"/>
    <path d="M0,430 q40,-7 80,0 t80,0 t80,0 t80,0 t80,0 t80,0 t80,0 t80,0 t80,0 t80,0"/>
  </g>

  <!-- hill + castle silhouette -->
  <g fill="#23201c">
    <path d="M96,362 Q240,286 384,362 Z"/>
    <!-- tier 1 -->
    <rect x="212" y="286" width="56" height="26"/>
    <polygon points="198,286 282,286 268,274 212,274"/>
    <!-- tier 2 -->
    <rect x="220" y="262" width="40" height="24"/>
    <polygon points="208,262 272,262 260,252 220,252"/>
    <!-- tier 3 -->
    <rect x="228" y="242" width="24" height="20"/>
    <polygon points="218,242 262,242 240,228"/>
    <!-- finial -->
    <rect x="238" y="223" width="4" height="6"/>
  </g>

  <!-- a lone sail on the sea -->
  <g fill="#23201c" opacity="0.55">
    <path d="M470,372 l0,-26 l16,26 Z"/>
    <rect x="468" y="370" width="20" height="4"/>
  </g>
</svg>
